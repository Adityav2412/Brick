# Cloudflare Pages deployment configuration for Brick PWA.
#
# Build:   NITRO_PRESET=cloudflare-pages npm run build
# Deploy:  npx wrangler pages deploy dist
#
# Nitro's cloudflare-pages preset produces a single `dist/` directory
# containing both static assets and `_worker.js/` (the SSR function).

name = "brick-pwa"
compatibility_date = "2026-06-16"
compatibility_flags = ["nodejs_compat"]
pages_build_output_dir = "dist"

[vars]
# Set these via `wrangler secret put` or in the Cloudflare dashboard:
# SUPABASE_URL = "https://qgkyrdjysjplmrmsdeki.supabase.co"
# SUPABASE_SERVICE_ROLE_KEY = "..."
