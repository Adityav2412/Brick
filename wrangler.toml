# Cloudflare Workers deployment configuration for Brick PWA.
#
# Build:   NITRO_PRESET=cloudflare-module npm run build
# Deploy:  npx wrangler deploy
#
# The Nitro build generates .output/server/wrangler.json automatically,
# but this top-level file is needed for `wrangler deploy` to find the project.

name = "brick-pwa"
compatibility_date = "2026-06-16"
compatibility_flags = ["nodejs_compat"]
main = ".output/server/index.mjs"

[assets]
directory = ".output/public"

[vars]
# Set these via `wrangler secret put` or in the Cloudflare dashboard:
# SUPABASE_URL = "https://qagmtttepdufqjoebtgf.supabase.co"
# SUPABASE_SERVICE_ROLE_KEY = "..."
